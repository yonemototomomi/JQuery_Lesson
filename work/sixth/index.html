<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../common/css/reset.css">
  <link rel="stylesheet" href="../../common/css/base.css">
  <link rel="stylesheet" href="./css/style.css">
  <title>Document</title>
</head>
<body>
  <div class="wrapper" id="wrapper">
    <button type="button" class="btn search-btn" id="pokemon_search">ポケモンを探す</button>
  </div>
  <script src="../../common/js/jquery.js"></script>
  <script>
    // 回答はここに書いてね
    $(function() {
      // ポケモンを探すボタン
      $('#wrapper').on('click', '#pokemon_search', function() {

        let randomId = Math.floor(Math.random() * 151) + 1; // 1〜151のポケモン
        // APIでポケモン情報を取得
        $.ajax({
          url: `https://pokeapi.co/api/v2/pokemon/${randomId}`,
          method: 'GET',
          dataType: 'json',
          success: function(pokemon) {
            $.ajax({
              url: pokemon.species.url,
              method: 'GET',
              dataType: 'json',
              success: function(species) {
                let jpName = pokemon.name; // デフォルトは英語名

                for (let n of species.names) {
                  if (n.language.name === "ja-Hrkt") {
                    jpName = n.name;
                    break; // 見つかったらループ終了
                  }
                }

                // ポケモンを捕まえる画面のHTML
                let encountHtml =
                `
                  <p class="name">${jpName}</p>
                  <div>
                    <img class="img" src="${pokemon.sprites.front_default}" alt="${jpName}">
                  </div>
                  <div>
                    <button class="btn" id="catch">捕まえる</button>
                    <button class="btn" data-js="reset">逃げる</button>
                  </div>
                `;

                // 画面に挿入
                $('#wrapper').html(encountHtml);

                // ポケモンを探すボタンは非表示
                $('#pokemon_search').hide();
              }
            });
          }
        });
      });
      // ポケモンを捕まえるボタン
      $('#wrapper').on('click', '#catch', function() {
        console.log("捕まえるボタンをクリック");
        let isWin = Math.random() < 0.5;

        if (isWin) {
          $.ajax({
            url: 'https://pokeapi.co/api/v2/item/4',
            method: 'GET',
            dataType: 'json',
            success: function(pokemonget) {

              let item = pokemonget;
              
              let pokeball = {
                name: item.name,
                img: item.sprites.default
              };

              let winHtml =
              `
                <p class="name">ゲットしました</p>
                <div>
                  <img class="img" src="${pokeball.img}" alt="${pokeball.name}">
                </div>
                <button class="btn" data-js="reset">戻る</button>
              `;
              $('#wrapper').html(winHtml);
            }
          });
        } else {
            let failHtml =
            `
              <p class="text">逃げられてしまった...</p>
              <button class="btn mt" data-js="reset">戻る</button>
            `;
            $('#wrapper').html(failHtml);
          }
        });

      // 戻るボタンをクリック
      $(document).on('click', '[data-js="reset"]', function() {
        let startHtml = 
        `
          <button type="button" class="btn search-btn" id="pokemon_search">ポケモンを探す</button>
        `;
        $('#wrapper').html(startHtml);
      });
    });
  </script>
</body>
</html>
